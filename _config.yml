# Site settings
title: DAQ Electronics Support Docs
description: Customer support documentation for DAQ Electronics products.
url: "https://daqdave.github.io"
baseurl: "/daiq-docs"

# Use the Just-the-Docs theme for a clean, searchable documentation site.
# This is a remote theme so GitHub Pages will build it without extra config.
remote_theme: just-the-docs/just-the-docs

# Just-the-Docs options
search_enabled: true
search:
  heading_level: 3
  previews: 2
  preview_words_before: 3
  preview_words_after: 3

color_scheme: light

heading_anchors: true

# Don't process these when Jekyll builds the site
exclude:
  - README.md
  - SETUP-GUIDE.md
  - scripts/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
  # Old per-article markdown source — superseded by index.html with embedded
  # images. Excluded so Jekyll renders only the HTML and avoids URL collisions
  # between docs/<slug>/index.md and docs/<slug>/index.html.
  - "docs/*/index.md"
  # Old per-article image folders — images are now base64-embedded in the HTML.
  # These folders may still exist on disk in legacy clones; excluded so Jekyll
  # does not copy ~230 MB of redundant images into the published site.
  - "docs/*/images"

plugins:
  - jekyll-remote-theme
